version: "3.8"

services:
  database:
    image: postgres:15
    container_name: database_order_hub
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-order_hub}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
    networks:
      - orderhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  order_service:
    build:
      context: ../
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.0.1}
    container_name: order-service
    ports:
      - "${ORDER_SERVICE_PORT:-8081}:8081"
    environment:
      SERVER_PORT: 8081

      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}

      DATABASE_HOST: database
      DATABASE_PORT: ${POSTGRES_PORT}
      DATABASE_NAME: ${POSTGRES_DB}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}

      LOG_LEVEL: INFO

      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"  # Включаем экспорт в Prometheus
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics,loggers
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Проверка, что Spring Boot жив и отвечает
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s      # Реже, чем у БД (Spring Boot тяжелее стартует)
      timeout: 10s
      retries: 3
      start_period: 40s  # Даём время на запуск (первые 40с не проверяем)
    networks:
      - orderhub-network

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus_order_hub
    volumes:
      - ../src/main/resources/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    depends_on:
      order_service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - orderhub-network

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana_order_hub
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_PLUGINS_DISABLE_PLUGIN_MANIFEST_VERIFY: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_CHECK_FOR_UPDATES: "false"               # для старых версий
      GF_SERVER_ENFORCE_DOMAIN: "false"
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "true"
      GF_PLUGINS_MANIFEST_FETCH_URL: ""
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - orderhub-network

volumes:
  postgres_data:
    name: order_hub_postgres_data
  prometheus_data:
    name: order_hub_prometheus_data
  grafana_data:
    name: order_hub_grafana_data

networks:
  orderhub-network:
    name: orderhub-network
    driver: bridge