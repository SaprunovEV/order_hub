spring:
  application:
    name: order_hub
  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${POSTGRES_PORT:5432}/${DATABASE_NAME:order_hub}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: ${SERVER_PORT:8081}

logging:
  level:
    org.hibernate.org: ${LOGGING_LEVEL:DEBUG}